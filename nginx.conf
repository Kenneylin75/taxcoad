# ==========================================
# 雲端宮廟 SaaS 系統 - Nginx 安全反向代理設定檔 (nginx.conf)
# ==========================================

server {
    listen 80;
    listen [::]:80;
    server_name your-temple-domain.com *.your-temple-domain.com;

    # 所有不安全的 HTTP 請求自動重定向至安全的 HTTPS 加密通道
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-temple-domain.com *.your-temple-domain.com;

    # SSL 安全憑證配置 (Let's Encrypt 自動生成憑證之路徑)
    ssl_certificate /etc/letsencrypt/live/your-temple-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-temple-domain.com/privkey.pem;

    # 頂級安全 SSL 通訊協定與密碼套件配置 (A+ 安全級別)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    
    # SSL 會話快取，提升二次握手速度與併發效能
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 啟用 HSTS 強制安全瀏覽策略 (持續 1 年)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 靜態資源 Gzip 壓縮，降低頻寬開銷，提升首屏載入速度
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 信眾媒體檔案與上傳圖片大小限制 (設定為 50MB 以支援高清活動相簿)
    client_max_body_size 50M;

    # 反向代理轉發至後端 PM2 運行的 Next.js 進程
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # 啟用 WebSocket 支援 (支援即時現場排隊與 believers 廣播通知)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 快取與緩衝區調優，支持高併發請求
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}
